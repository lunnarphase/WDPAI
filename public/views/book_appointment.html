<body style="background-color: var(--bg-color);">

    <div class="booking-container">
        <a href="/dashboard" class="back-link"><i class="fa-solid fa-arrow-left"></i> Wróć do panelu</a>

            <div class="error-messages" style="color: #b91c1c; background: #fef2f2; padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; font-size: 0.9rem; border: 1px solid #fee2e2;">
                <?php foreach($messages as $message) { echo htmlspecialchars($message); } ?>
            </div>
        <?php endif; ?>

        <h2>Wybierz termin</h2>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Dostępne terminy na 2 tygodnie do przodu.</p>

        <form id="bookingForm" action="/confirm-appointment" method="POST">
            <input type="hidden" name="doctor_id" id="doctor_id" value="<?= htmlspecialchars($doctorId) ?>">
            <input type="hidden" name="appointment_date" id="selected_date">
            <input type="hidden" name="appointment_time" id="selected_time">

            <div class="dates-wrapper" id="calendar-container">
                <p style="color: var(--text-muted); font-size: 0.85rem;">Trwa wczytywanie dostępności lekarza...</p>
            </div>
            
            <div class="time-slots-group" id="time-section">
                <label style="font-size: 1rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Wybierz godzinę</label>
                <div class="time-grid" id="time-container"></div>
            </div>

            <p style="color: var(--text-muted); margin-top: 2rem;">
                * Jeśli chcesz umówić wizytę z wyprzedzeniem, zadzwoń: <strong style="color: var(--text-main); display: block; font-size: 1.2rem; margin-top: 0.5rem;">+48 800 123 456</strong>
            </p>

            <button type="submit" class="btn-submit" id="submit-btn" disabled>Potwierdź rezerwację</button>
        </form>
    </div>

    <script>
        const doctorIdElement = document.getElementById('doctor_id');
        const doctorId = doctorIdElement ? doctorIdElement.value : null;
        
        const calendarContainer = document.getElementById('calendar-container');
        const timeSection = document.getElementById('time-section');
        const timeContainer = document.getElementById('time-container');
        const submitBtn = document.getElementById('submit-btn');
        const bookingForm = document.getElementById('bookingForm');

        let selectedDate = null;
        let selectedTime = null;

        const daysPl = ['Ndz', 'Pon', 'Wto', 'Śro', 'Czw', 'Pią', 'Sob'];
        const monthsPl = ['Sty', 'Lut', 'Mar', 'Kwi', 'Maj', 'Cze', 'Lip', 'Sie', 'Wrz', 'Paź', 'Lis', 'Gru'];

        let days = [];
        let today = new Date();
        for (let i = 0; i < 14; i++) {
            let d = new Date(today);
            d.setDate(d.getDate() + i);
            let isoDate = d.toISOString().split('T')[0];
            days.push({ dateObj: d, isoDate: isoDate, dayName: daysPl[d.getDay()], dayNum: d.getDate(), monthName: monthsPl[d.getMonth()] });
        }

        if (doctorId) {
            const startDate = days[0].isoDate;
            const endDate   = days[days.length - 1].isoDate;
            fetch(`/api-get-available-dates?doctor_id=${encodeURIComponent(doctorId)}&start_date=${encodeURIComponent(startDate)}&end_date=${encodeURIComponent(endDate)}`)
            .then(res => {
                if (!res.ok) throw new Error("Błąd serwera: " + res.status);
                return res.json();
            })
            .then(availableDates => {
                const availableSet = new Set(availableDates);

                calendarContainer.innerHTML = '';

                if (availableSet.size === 0) {
                    calendarContainer.innerHTML = '<p style="color:#64748b; font-size:0.9rem; padding:0.5rem 0; width:100%; text-align:center;">Ten lekarz nie ma jeszcze ustawionego harmonogramu. Spróbuj ponownie później.</p>';
                    return;
                }

                days.forEach(day => {
                    const isAvailable = availableSet.has(day.isoDate);

                    const card = document.createElement('div');
                    card.className = `date-card ${isAvailable ? '' : 'disabled'}`;
                    card.innerHTML = `<span class="day-name">${day.dayName}</span><span class="day-num">${day.dayNum}</span><span class="month-name">${day.monthName}</span>`;

                    if (isAvailable) {
                        card.addEventListener('click', () => selectDate(card, day.isoDate));
                    }
                    calendarContainer.appendChild(card);
                });
            })
            .catch(err => {
                console.error("Błąd kalendarza:", err);
                calendarContainer.innerHTML = '<p style="color:#ef4444; font-size:0.85rem; padding:1rem; text-align:center; width: 100%;">Błąd podczas wczytywania dostępności.</p>';
            });
        }

        function selectDate(cardElement, isoDate) {
            document.querySelectorAll('.date-card').forEach(c => c.classList.remove('selected'));
            cardElement.classList.add('selected');

            selectedDate = isoDate;
            selectedTime = null;

            submitBtn.disabled = true;
            submitBtn.classList.remove('active');
            timeSection.style.display = 'block';
            timeContainer.innerHTML = '<p style="color:#64748b; font-size:0.85rem;">Wczytywanie godzin...</p>';

            fetch(`/api-get-slots?doctor_id=${encodeURIComponent(doctorId)}&date=${encodeURIComponent(isoDate)}`)
            .then(res => res.json())
            .then(availableSlots => {
                timeContainer.innerHTML = '';
                if (!availableSlots || availableSlots.length === 0) {
                    timeContainer.innerHTML = '<p style="color:#64748b; font-size:0.85rem;">Brak dostępnych godzin w tym dniu.</p>';
                    return;
                }
                availableSlots.forEach(time => {
                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'time-slot';
                    timeDiv.innerText = time;
                    timeDiv.addEventListener('click', () => selectTime(timeDiv, time));
                    timeContainer.appendChild(timeDiv);
                });
            })
            .catch(() => {
                timeContainer.innerHTML = '<p style="color:#ef4444; font-size:0.85rem;">Błąd wczytywania godzin.</p>';
            });

            if (window.innerWidth < 600) {
                timeSection.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function selectTime(timeElement, timeString) {
            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
            timeElement.classList.add('selected');

            selectedTime = timeString;

            submitBtn.disabled = false;
            submitBtn.classList.add('active');
        }

        bookingForm.addEventListener('submit', function(e) {
            e.preventDefault();

            if (!selectedDate || !selectedTime) {
                alert('Proszę wybrać datę i godzinę!');
                return;
            }

            document.getElementById('selected_date').value = selectedDate;
            document.getElementById('selected_time').value = selectedTime;

            bookingForm.submit();
        });
    </script>
</body>
</html>
