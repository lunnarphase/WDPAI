        <h2>Wybierz termin</h2>

        <form id="bookingForm" action="/confirm-appointment" method="POST">
            <input type="hidden" name="doctor_id" id="doctor_id" value="<?= $doctorId ?>">
            <input type="hidden" name="appointment_date" id="selected_date" required>
            <input type="hidden" name="appointment_time" id="selected_time" required>

            <div class="dates-wrapper" id="calendar-container">
                <p style="color: var(--text-muted); font-size: 0.85rem;">Trwa wczytywanie dostępności lekarza...</p>
            </div>
            
            <div class="time-slots-group" id="time-section">
                <label style="font-size: 1rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Wybierz godzinę</label>

            </div>

                * Jeśli chcesz umówić wizytę z wyprzedzeniem, zadzwoń: <strong style="color: var(--text-main); display: block; font-size: 1.2rem; margin-top: 0.5rem;">+48 800 123 456</strong>
            </p>

            <button type="submit" class="btn-submit" id="submit-btn" disabled>Potwierdź rezerwację</button>
        </form>
    </div>

    <script>
        const doctorId = document.getElementById('doctor_id').value;
        const calendarContainer = document.getElementById('calendar-container');
        const timeSection = document.getElementById('time-section');
        const timeContainer = document.getElementById('time-container');
        const submitBtn = document.getElementById('submit-btn');
        const inputDate = document.getElementById('selected_date');
        const inputTime = document.getElementById('selected_time');

        const workingHours = ['09:00', '09:30', '10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00'];
        const totalSlots = workingHours.length;
        const daysPl = ['Ndz', 'Pon', 'Wto', 'Śro', 'Czw', 'Pią', 'Sob'];
        const monthsPl = ['Sty', 'Lut', 'Mar', 'Kwi', 'Maj', 'Cze', 'Lip', 'Sie', 'Wrz', 'Paź', 'Lis', 'Gru'];

        let days = [];
        let today = new Date();
        for (let i = 0; i < 14; i++) {
            let d = new Date(today);
            d.setDate(d.getDate() + i);
            let isoDate = d.toISOString().split('T')[0];
            days.push({ dateObj: d, isoDate: isoDate, dayName: daysPl[d.getDay()], dayNum: d.getDate(), monthName: monthsPl[d.getMonth()] });
        }

        fetch('/doctor-availability', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ doctor_id: doctorId, start_date: days[0].isoDate, end_date: days[days.length - 1].isoDate })
        })
        .then(res => res.json())
        .then(bookedData => {
            let bookedMap = {};
            bookedData.forEach(row => {
                if(!bookedMap[row.appointment_date]) bookedMap[row.appointment_date] = [];
                bookedMap[row.appointment_date].push(row.appointment_time);
            });

            calendarContainer.innerHTML = '';
            days.forEach(day => {
                const bookedCount = bookedMap[day.isoDate] ? bookedMap[day.isoDate].length : 0;
                const isFull = bookedCount >= totalSlots; 
                const isSunday = day.dateObj.getDay() === 0; 

                const card = document.createElement('div');
                card.className = `date-card ${isFull || isSunday ? 'disabled' : ''}`;
                card.innerHTML = `<span class="day-name">${day.dayName}</span><span class="day-num">${day.dayNum}</span><span class="month-name">${day.monthName}</span>`;

                if (!isFull && !isSunday) {
                    card.addEventListener('click', () => selectDate(card, day.isoDate, bookedMap[day.isoDate] || []));
                }
                calendarContainer.appendChild(card);
            });
        });

        function selectDate(cardElement, isoDate, bookedTimesForDay) {
            document.querySelectorAll('.date-card').forEach(c => c.classList.remove('selected'));
            cardElement.classList.add('selected');
            inputDate.value = isoDate; inputTime.value = '';
            submitBtn.disabled = true; submitBtn.classList.remove('active');
            timeSection.style.display = 'block'; timeContainer.innerHTML = '';

            workingHours.forEach(time => {
                const timeDiv = document.createElement('div');
                const isBooked = bookedTimesForDay.includes(time + ':00');
                timeDiv.className = `time-slot ${isBooked ? 'booked' : ''}`;
                timeDiv.innerText = time;
                if (!isBooked) { timeDiv.addEventListener('click', () => selectTime(timeDiv, time)); }
                timeContainer.appendChild(timeDiv);
            });
        }

        function selectTime(timeElement, timeString) {
            document.querySelectorAll('.time-slot').forEach(t => t.classList.remove('selected'));
            timeElement.classList.add('selected');
            inputTime.value = timeString;
            submitBtn.disabled = false; submitBtn.classList.add('active'); 
        }
    </script>
</body>
</html>
