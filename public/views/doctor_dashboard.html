    <script>
        // Logika modalu statusu
        function openStatusModal(id, patientName, time, status) {
            document.getElementById('modal_app_id').value = id;
            document.getElementById('modal_patient_name').value = patientName;
            document.getElementById('modal_app_time').value = time;
            document.getElementById('modal_status').value = status;
            
            document.getElementById('statusModal').classList.add('active');
        }

        function closeStatusModal() {
            document.getElementById('statusModal').classList.remove('active');
        }

        // Proste filtrowanie harmonogramu
        function filterSchedule() {
            const filter = document.getElementById('scheduleFilter').value;
            const rows = document.querySelectorAll('.schedule-row');
            
            rows.forEach(row => {
                const isToday = row.getAttribute('data-today') === 'true';
                const status = row.getAttribute('data-status');
                
                if (filter === 'today') {
                    row.style.display = (isToday && status !== 'completed' && status !== 'cancelled' && status !== 'noshow') ? '' : 'none';
                } else if (filter === 'upcoming') {
                    row.style.display = (status === 'confirmed') ? '' : 'none';
                } else {
                    row.style.display = ''; // Wszystkie (historia)
                }
            });
        }
        
        // Odpal filtr przy załadowaniu strony
        document.addEventListener('DOMContentLoaded', filterSchedule);
    </script>
