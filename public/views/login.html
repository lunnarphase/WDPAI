    <script>
        const loginForm = document.getElementById('login-form');
        const loginValidationMessage = document.getElementById('login-validation-message');
        const loginEmailInput = document.getElementById('email');
        const loginPasswordInput = document.getElementById('password');

        function showLoginValidationMessage(message) {
            if (!loginValidationMessage) {
                return;
            }
            loginValidationMessage.style.display = 'block';
            loginValidationMessage.innerHTML = `<p>${message}</p>`;
        }

        function clearLoginValidationMessage() {
            if (!loginValidationMessage) {
                return;
            }
            loginValidationMessage.style.display = 'none';
            loginValidationMessage.innerHTML = '';
        }

        function isValidEmailAddress(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
        }

        if (loginForm) {
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                clearLoginValidationMessage();

                const email = (loginEmailInput?.value || '').trim();
                const password = loginPasswordInput?.value || '';

                if (!email || !password) {
                    showLoginValidationMessage('Wypełnij email i hasło.');
                    return;
                }

                if (!isValidEmailAddress(email)) {
                    showLoginValidationMessage('Podaj poprawny adres email, np. nazwa@domena.pl.');
                    return;
                }

                loginForm.submit();
            });
        }

        if (loginEmailInput) {
            loginEmailInput.addEventListener('input', clearLoginValidationMessage);
        }

        if (loginPasswordInput) {
            loginPasswordInput.addEventListener('input', clearLoginValidationMessage);
        }
    </script>
