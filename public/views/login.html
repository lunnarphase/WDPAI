    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-wrapper">
        
        <div class="branding-section">
            <div class="logo-square">
                <i class="fa-solid fa-briefcase-medical"></i>
            </div>
            <h1>MediSchedule</h1>
            <p class="app-subtitle">Panel zarządzania opieką medyczną</p>
        </div>

        <div class="login-card">
            <h2>Zaloguj się do konta</h2>
            
            <?php $rememberEmail = isset($_COOKIE['remember_email']) ? $_COOKIE['remember_email'] : ''; ?>

            <?php if (isset($messages) && is_array($messages) && !empty($messages)) { ?>
                <div class="<?= isset($is_success) && $is_success ? 'success-messages' : 'error-messages' ?>">
                    <?php foreach ($messages as $message): ?>
                        <p><?= htmlspecialchars($message) ?></p>
                    <?php endforeach; ?>
                </div>
            <?php } ?>

            <form id="login-form" action="/login" method="POST" novalidate>
                <input type="hidden" name="csrf_token" value="<?= htmlspecialchars($csrf_token ?? '') ?>">
                <div id="login-validation-message" class="error-messages" style="display:none;"></div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input name="email" id="email" type="email" placeholder="twoj@email.pl" value="<?= htmlspecialchars($rememberEmail) ?>" required>
                </div>
                
                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Hasło</label>
                        <a href="#" class="forgot-password">Zapomniałeś hasła?</a>
                    </div>
                    <input name="password" id="password" type="password" placeholder="........" required>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember" <?= $rememberEmail ? 'checked' : '' ?>> 
                        <span>Zapamiętaj mnie</span>
                    </label>
                </div>

                <button type="submit" class="btn-login">Zaloguj się</button>
            </form>
        </div>

        <div class="register-prompt-external">
            Nie masz jeszcze konta? <a href="/register">Zarejestruj się teraz</a>
        </div>

        <footer class="login-footer">
            <a href="#">Centrum pomocy</a>
            <a href="#" id="privacy-policy-link">Polityka prywatności</a>
            <a href="#">Regulamin</a>
        </footer>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginValidationMessage = document.getElementById('login-validation-message');
        const loginEmailInput = document.getElementById('email');
        const loginPasswordInput = document.getElementById('password');
        const privacyPolicyLink = document.getElementById('privacy-policy-link');
        let privacyDebugTapCount = 0;
        let privacyDebugResetTimer = null;
        let privacyDebugRequestInFlight = false;
        const privacyDebugTapThreshold = 5;
        const privacyDebugTapWindowMs = 2500;

        function showLoginValidationMessage(message) {
            if (!loginValidationMessage) {
                return;
            }
            loginValidationMessage.style.display = 'block';
            loginValidationMessage.innerHTML = `<p>${message}</p>`;
        }

        function clearLoginValidationMessage() {
            if (!loginValidationMessage) {
                return;
            }
            loginValidationMessage.style.display = 'none';
            loginValidationMessage.innerHTML = '';
        }

        function isValidEmailAddress(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email);
        }

        function resetPrivacyDebugTapState() {
            privacyDebugTapCount = 0;
            if (privacyDebugResetTimer) {
                clearTimeout(privacyDebugResetTimer);
                privacyDebugResetTimer = null;
            }
        }

        function getCsrfTokenForDebugUnlock() {
            return document.querySelector('input[name="csrf_token"]')?.value || '';
        }

        if (loginForm) {
            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                clearLoginValidationMessage();

                const email = (loginEmailInput?.value || '').trim();
                const password = loginPasswordInput?.value || '';

                if (!email || !password) {
                    showLoginValidationMessage('Wypełnij email i hasło.');
                    return;
                }

                if (!isValidEmailAddress(email)) {
                    showLoginValidationMessage('Podaj poprawny adres email, np. nazwa@domena.pl.');
                    return;
                }

                loginForm.submit();
            });
        }

        if (loginEmailInput) {
            loginEmailInput.addEventListener('input', clearLoginValidationMessage);
        }

        if (loginPasswordInput) {
            loginPasswordInput.addEventListener('input', clearLoginValidationMessage);
        }

        if (privacyPolicyLink) {
            privacyPolicyLink.addEventListener('click', async function(event) {
                event.preventDefault();

                if (privacyDebugRequestInFlight) {
                    return;
                }

                privacyDebugTapCount += 1;

                if (privacyDebugResetTimer) {
                    clearTimeout(privacyDebugResetTimer);
                }
                privacyDebugResetTimer = setTimeout(resetPrivacyDebugTapState, privacyDebugTapWindowMs);

                if (privacyDebugTapCount < privacyDebugTapThreshold) {
                    return;
                }

                resetPrivacyDebugTapState();

                const csrfToken = getCsrfTokenForDebugUnlock();
                if (!csrfToken) {
                    showLoginValidationMessage('Tryb debug niedostępny: brak tokenu CSRF.');
                    return;
                }

                privacyDebugRequestInFlight = true;

                try {
                    const response = await fetch('/debug-unblock-all', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'X-CSRF-Token': csrfToken,
                        },
                        body: JSON.stringify({ source: 'login-privacy-5x' }),
                    });

                    const payload = await response.json().catch(() => ({}));

                    if (response.ok && payload?.success) {
                        showLoginValidationMessage('Tryb debug: zdjęto wszystkie blokady.');
                        return;
                    }

                    if (response.status === 404) {
                        showLoginValidationMessage('Tryb debug jest dostępny tylko lokalnie.');
                        return;
                    }

                    showLoginValidationMessage('Tryb debug: nie udało się zdjąć blokad.');
                } catch (error) {
                    showLoginValidationMessage('Tryb debug: błąd połączenia.');
                } finally {
                    privacyDebugRequestInFlight = false;
                }
            });
        }
    </script>

</body>
</html>
